; PlatformIO project for the Arduino Nano unit firmware.
; Run from this directory:
;   pio run                       build
;   pio run -t upload             flash sketch
;
; If upload fails, try -e unit_old_bootloader (matches Arduino IDE's
; "ATmega328P (Old Bootloader)" processor selection).

[platformio]
src_dir = .
default_envs = unit

[env:unit]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
lib_deps =
  arduino-libraries/Stepper@1.1.3

[env:unit_old_bootloader]
extends = env:unit
board = nanoatmega328
