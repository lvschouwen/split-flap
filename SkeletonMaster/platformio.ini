; PlatformIO project for the minimal ESP8266 "skeleton" master firmware.
; See issue #61.
;
; This is a stripped-down OTA bootstrap: WiFi + sync ESP8266WebServer +
; /firmware/master handler (with the TX-power reduce from #60). No I2C,
; no web UI assets, no clock. Used as a staging firmware to isolate
; "does OTA work on this device" from "does the full image OTA reliably",
; and as a fallback the operator can always bounce through if the full
; firmware ever silent-reverts.
;
; Flash layout matches ESPMaster (eagle.flash.1m.ld, 1 MB, no FS) so eboot
; OTA semantics are identical — a bin built here and a bin built there
; occupy the same run/staging slots.
;
; Shares SettingsEepromLayout.h and WifiCredentials.h with ESPMaster via
; the -I../ESPMaster include path. EEPROM layout is compatible, so a
; big firmware → skeleton → big firmware OTA hop preserves user settings.

[platformio]
src_dir = .
default_envs = skeletonmaster

[env:skeletonmaster]
platform = espressif8266
board = esp01_1m
board_build.ldscript = eagle.flash.1m.ld
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_ldf_mode = deep+
build_src_filter = +<*> -<.pio/>
extra_scripts = pre:build_version.py
build_flags =
  ; Pick up shared headers (SettingsEepromLayout.h, WifiCredentials.h)
  ; from the main firmware tree without copying them.
  -I../ESPMaster
lib_deps =
  EEPROM
