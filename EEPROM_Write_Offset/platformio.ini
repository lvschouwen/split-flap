; PlatformIO project for the one-shot EEPROM calibration sketch.
; Run from this directory:
;   pio run -t upload             flash to a Nano
;   pio device monitor            read/write the calibration offset at 115200

[platformio]
src_dir = .
default_envs = eeprom_write_offset

[env:eeprom_write_offset]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200

[env:eeprom_write_offset_old_bootloader]
extends = env:eeprom_write_offset
board = nanoatmega328
