; PlatformIO project for the ESP32-S3 master firmware (Master v2 Rev B).
;
; Target hardware: ESP32-S3-WROOM-1-N16R8 module on the Master v2 carrier PCB.
; See PCB/MASTER_V2/PINOUT.md for the GPIO map and SCHEMATIC.md for the
; electrical context.
;
; Why pioarduino fork (not stock platformio.org/espressif32):
;   stock espressif32 lags arduino-esp32 v3.x. We need v3.x+ for ESP32-H2
;   support in MasterH2/, and we use the same fork here for consistency.
;
; Phase 2 scope (issue #63 / part of #58): scaffold only — three LEDs
; blink and USB-CDC heartbeat. No WiFi, no I2C, no web UI yet.

[platformio]
src_dir = src
default_envs = masters3

[env:masters3]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38-1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
; Pull in firmware/lib/common/ as a PlatformIO library.
; library.json at that path declares what to compile and what headers to expose.
lib_extra_dirs = ${PROJECT_DIR}/../lib
lib_deps =
    common
    ; ESP32Async forks are the maintained ESP32 path (successor to the
    ; dvarrel ESP8266 fork used in firmware/ESPMaster/). See meta #58.
    ESP32Async/AsyncTCP@^3.2.0
    ESP32Async/ESPAsyncWebServer@^3.6.0
build_flags =
    ; Enable USB-CDC on boot so Serial → native USB (no FTDI cable needed).
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
; LittleFS + Preferences ship with arduino-esp32 — no external libs needed.
