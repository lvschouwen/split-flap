; PlatformIO project for the ESP8266 master firmware.
; Run from this directory:
;   pio run                       build
;   pio run -t upload             flash sketch (via USB-UART, one-time only)
;   pio test -e native            run host-side unit tests
;
; Flash layout: eagle.flash.1m.ld = 1MB flash with **no** filesystem.
; The web UI and bundled unit firmware live in PROGMEM (see WebAssets.h),
; freed area is given over to OTA staging so web-OTA fits on ESP-01 1M.

[platformio]
src_dir = .
; Build BOTH 1 MB and 4 MB flash variants by default. The same source ships
; in two bin headers so users can OTA whichever matches the chip their
; currently-running firmware was built for. See issue #92.
default_envs = espmaster, espmaster_4m

; Common ESPMaster build settings shared by both flash-size envs. Kept here
; so the per-env blocks only diverge on board / ldscript.
[espmaster_common]
platform = espressif8266
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_ldf_mode = deep+
; src_dir is the project root so exclude the test tree explicitly.
build_src_filter = +<*> -<test/>  -<.pio/>
extra_scripts = pre:build_assets.py
build_flags =
  ; ESP8266 Wire default buffer is 128 bytes. Twiboot's page-write command
  ; needs 132 bytes (4 header + 128 page) in a single transaction, so bump
  ; the Wire buffer to 256 for enough headroom.
  -DI2C_BUFFER_LENGTH=256
lib_deps =
  https://github.com/dvarrel/ESPAsyncTCP.git#1.2.4
  https://github.com/dvarrel/ESPAsyncWebSrv.git#1.2.9
  https://github.com/alanswx/ESPAsyncWiFiManager.git
  EEPROM

[env:espmaster]
extends = espmaster_common
board = esp01_1m
board_build.ldscript = eagle.flash.1m.ld

; 4 MB variant for ESP modules that report a 4 MB chip (e.g. ESP-12 / some
; ESP-01 clones). Same code, different bin header + linker layout. Required
; because Update.begin()'s checkFlashConfig() rejects an OTA when the
; currently-running firmware's bin header claims a bigger chip than the
; chip really is — so devices already running a 4 MB-headed image can only
; be re-OTA'd with another 4 MB-headed image. See issue #92.
[env:espmaster_4m]
extends = espmaster_common
board = esp12e
board_build.ldscript = eagle.flash.4m.ld

; Host-side unit tests for pure sketch logic (no Arduino hardware deps).
; Runs with: pio test -e native
[env:native]
platform = native
test_framework = unity
test_build_src = no
lib_ldf_mode = deep+
lib_deps =
  fabiobatsilva/ArduinoFake@^0.4.0
build_flags =
  -std=gnu++17
  -D UNIT_TEST
  -D UNITS_AMOUNT=10
  -D FLAP_AMOUNT=45
  -D MIN_SPEED=1
  -D MAX_SPEED=12
