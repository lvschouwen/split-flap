; PlatformIO project for the ESP32-H2 radio coprocessor firmware
; (Master v2 Rev B).
;
; Target hardware: ESP32-H2-MINI-1-N4 module on the Master v2 carrier PCB.
; See PCB/MASTER_V2/PINOUT.md (H2 section) for the GPIO map.
;
; pioarduino fork required: ESP32-H2 (RISC-V, channel 11–26 802.15.4)
; was added in arduino-esp32 v3.x, which stock platformio.org/espressif32
; doesn't track yet. The pioarduino fork mirrors arduino-esp32 v3.x.
;
; Phase 2 scope (issue #63 / part of #58): scaffold only — LED blink +
; UART heartbeat. UART link to S3 (UART1 on IO4/IO5) lands in Phase 3.

[platformio]
src_dir = src
default_envs = masterh2

[env:masterh2]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38-1
board = esp32-h2-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
; Pull in firmware/lib/common/ as a PlatformIO library.
lib_extra_dirs = ${PROJECT_DIR}/../lib
lib_deps = common
build_flags =
    -DCORE_DEBUG_LEVEL=3
; LittleFS + Preferences ship with arduino-esp32 — no external libs needed.
