; Host-side PlatformIO project for firmware/lib/common/.
;
; Only native test env — lib/common is a library consumed by MasterS3 and
; MasterH2 via `lib_extra_dirs = ${PROJECT_DIR}/..` + `lib_deps = common`
; in their platformio.ini. There is no firmware build target here.
;
; Run:
;   pio test -e native

[platformio]
src_dir = src
default_envs = native

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
  -Werror
  -Isrc
