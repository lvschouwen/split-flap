; Host-side PlatformIO project for firmware/lib/common/.
;
; Only native test env — lib/common is a library consumed by MasterS3 and
; MasterH2 via `-I${PROJECT_DIR}/../lib/common` in their build_flags. There
; is no firmware build target here.
;
; Run:
;   pio test -e native

[platformio]
src_dir = .
default_envs = native

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<cobs_crc.cpp> +<protocol.cpp>
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
  -Werror
  -I.
