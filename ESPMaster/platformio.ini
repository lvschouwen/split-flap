; PlatformIO project for the ESP8266 master firmware.
; Run from this directory:
;   pio run                       build
;   pio run -t upload             flash sketch
;   pio run -t uploadfs           flash LittleFS contents of ./data
;   pio test -e native            run host-side unit tests

[platformio]
src_dir = .
default_envs = espmaster

[env:espmaster]
platform = espressif8266
board = esp01_1m
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.filesystem = littlefs
lib_ldf_mode = deep+
; src_dir is the project root so exclude the test tree explicitly.
build_src_filter = +<*> -<test/>  -<.pio/>
; ezTime #includes several ESP8266 core libraries that aren't in its
; declared dependencies. Add the include paths manually so ezTime
; compiles.
build_flags =
  -I${platformio.packages_dir}/framework-arduinoespressif8266/libraries/EEPROM
  -I${platformio.packages_dir}/framework-arduinoespressif8266/libraries/ESP8266WiFi/src
  ; ESP8266 Wire default buffer is 128 bytes. Twiboot's page-write command
  ; needs 132 bytes (4 header + 128 page) in a single transaction, so bump
  ; the Wire buffer to 256 for enough headroom.
  -DI2C_BUFFER_LENGTH=256
lib_deps =
  bblanchon/ArduinoJson@7.0.4
  arduino-libraries/NTPClient@3.2.1
  https://github.com/ivanseidel/LinkedList.git#v1.3.3
  ropg/ezTime@0.8.3
  https://github.com/dvarrel/ESPAsyncTCP.git
  https://github.com/dvarrel/ESPAsyncWebSrv.git#1.2.7
  https://github.com/tzapu/WiFiManager.git#v2.0.17
  EEPROM
  ArduinoOTA

; Host-side unit tests for pure sketch logic (no Arduino hardware deps).
; Runs with: pio test -e native
[env:native]
platform = native
test_framework = unity
test_build_src = no
lib_ldf_mode = deep+
lib_deps =
  fabiobatsilva/ArduinoFake@^0.4.0
  https://github.com/ivanseidel/LinkedList.git#v1.3.3
build_flags =
  -std=gnu++17
  -I .pio/libdeps/native/LinkedList
  -D UNIT_TEST
  -D UNITS_AMOUNT=10
  -D FLAP_AMOUNT=45
  -D MIN_SPEED=1
  -D MAX_SPEED=12
